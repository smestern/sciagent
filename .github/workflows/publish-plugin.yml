name: Publish Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 1.2.0)"
        required: false

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sciagent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        run: |
          python scripts/build_plugin.py \
            --force \
            --version "${{ steps.version.outputs.version }}" \
            -o build/plugin/sciagent

      - name: Checkout sciagent-plugin repo
        uses: actions/checkout@v4
        with:
          repository: smestern/sciagent-plugin
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          path: sciagent-plugin-repo

      - name: Sync plugin contents
        run: |
          # Remove old contents (except .git)
          find sciagent-plugin-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          # Copy new build output
          cp -r build/plugin/sciagent/* sciagent-plugin-repo/
          cp -r build/plugin/sciagent/.github sciagent-plugin-repo/

      - name: Commit and push
        working-directory: sciagent-plugin-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin main --tags
