# Domain configurations index
# Each domain has a directory under docs/domains/ with skills and documentation.
# Generated by /configure-domain skill or sciagent wizard.

domains:
  - slug: intracellular-ephys
    name: Intracellular Electrophysiology (Patch-Clamp)
    description: >
      Whole-cell and perforated patch-clamp recordings from individual neurons.
      Analyzes action potential features, passive membrane properties, F-I curves,
      and dose-response relationships.
    packages:
      - pyabf
      - neo
      - elephant
      - efel
    skills:
      - domain-expertise
      - efel
      - elephant
      - neo
      - pyabf

  - slug: extracellular-ephys
    name: Extracellular Electrophysiology
    description: >
      Multi-electrode extracellular recordings. Spike sorting, LFP analysis,
      and population-level neural activity characterization.
    packages:
      - neo
      - elephant
      - spikeinterface
      - probeinterface
    skills:
      - domain-expertise
      - elephant
      - neo
      - probeinterface
      - spikeinterface
